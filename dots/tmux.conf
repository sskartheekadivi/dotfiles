# ==========================
# 1. Core Settings
# ==========================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -s  set-clipboard  on
set -sg escape-time    10
set -g  focus-events   on
set -g  default-terminal "tmux-256color"
set -g  history-limit  50000
set -g  base-index     1
set -g  pane-base-index 1
set -g  renumber-windows on
set -g  mouse          on
set -g  detach-on-destroy off
set -gq allow-passthrough on
set -g  visual-activity off
set-window-option -g xterm-keys on
set-option -sa terminal-overrides ",xterm*:Tc"

# ==========================
# 2. Prefix Bindings
# ==========================
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Alt + p : floating popup shell in current pane's directory
bind -n M-p display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "zsh"

# ==========================
# 3. Macro Navigation: Windows & Sessions
# ==========================
bind -n M-Left  previous-window
bind -n M-Right next-window
bind -n M-Up    switch-client -p
bind -n M-Down  switch-client -n

# ==========================
# 4. Micro Navigation & Resizing (Vim Keys)
# ==========================
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# ==========================
# 5. Pane Manipulation: Join & Break (Script Backed)
# ==========================
# Alt + - : Join pane into current window (horizontal split)
bind -n M-- choose-tree -w "run-shell \"~/.config/tmux/scripts/join_pane.sh '%%' -v\""

# Alt + = : Join pane into current window (vertical split)
# Using = instead of + (same physical key, no Shift required — more reliable across terminals)
bind -n M-= choose-tree -w "run-shell \"~/.config/tmux/scripts/join_pane.sh '%%' -h\""

# Alt + b : Break pane locally (restores original window name)
bind -n M-b run-shell "~/.config/tmux/scripts/break_pane.sh"

# Alt + Shift + b (M-B) : Break pane to a chosen session
bind -n M-B choose-tree -s "run-shell \"~/.config/tmux/scripts/break_pane.sh '%%'\""

# Alt + c, x, z, v, s : Standard creation/destruction
bind -n M-c new-window    -c "#{pane_current_path}"
bind -n M-x confirm-before -p "Kill pane? (y/n)" kill-pane
bind -n M-z resize-pane   -Z
bind -n M-v split-window  -h -c "#{pane_current_path}"
bind -n M-s split-window  -v -c "#{pane_current_path}"

# ==========================
# 6. Copy Mode & Clipboard (Vim Style)
# ==========================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v'   send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y'   send-keys -X copy-pipe-and-cancel "~/.config/tmux/scripts/clipboard_copy.sh"
bind-key -T copy-mode-vi Escape send -X cancel

# ==========================
# 7. Theme: Kanagawa Dragon
# ==========================
#   #181616  dragonBlack3  — terminal bg (matches nvim)
#   #1D1C19  dragonBlack2  — status bar bg
#   #282727  dragonBlack4  — active/highlight bg
#   #737c73  dragonAsh     — muted / inactive fg
#   #c5c9c5  dragonWhite   — main fg
#   #8ba4b0  dragonBlue2   — accent / active
#   #c4b28a  dragonYellow  — session label
#   #c4746e  dragonRed     — prefix active indicator

set -g status-interval              60
set -g status-style                 "bg=#1D1C19,fg=#c5c9c5"

# Left: session name — turns red when prefix is active
set -g status-left                  "#[bg=#{?client_prefix,#c4746e,#8ba4b0},fg=#181616,bold] #S #[default] "
set -g status-left-length           30

# Right: hostname  clock  date
set -g status-right                 "#[fg=#737c73] #H  %H:%M  %d %b "
set -g status-right-length          40

# Window list: show [Z] on active window when zoomed
set -g window-status-format         "#[fg=#737c73] #I  #W "
set -g window-status-current-format "#[bg=#282727,fg=#8ba4b0,bold] #I  #W#{?window_zoomed_flag, [Z],} "
set -g window-status-separator      ""

# Activity: flag background windows that produce output
set -g monitor-activity             on
set -g window-status-activity-style "fg=#c4b28a"

set -g pane-border-style            "fg=#282727"
set -g pane-active-border-style     "fg=#8ba4b0"
set -g message-style                "bg=#282727,fg=#c5c9c5"
set -g message-command-style        "bg=#282727,fg=#c4b28a"
set -g mode-style                   "bg=#282727,fg=#8ba4b0"

# ==========================
# 8. Plugins
# ==========================
set -g @plugin 'tmux-plugins/tpm#v3.0.0'
set -g @plugin 'tmux-plugins/tmux-sensible#v3.0.0'

run '~/.tmux/plugins/tpm/tpm'
